<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Links</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* GitHub Dark Mode color */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .social-link {
            display: block;
            background-color: #21262d;
            color: #c9d1d9;
            text-decoration: none;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        /* Hover effects for a premium feel */
        .social-link:hover {
            background-color: #58a6ff;
            color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Connect With Me</h1>
        
        <!-- REPLACE THE # WITH YOUR ACTUAL LINKS -->
        <a href="#" target="_blank" class="social-link">Facebook</a>
        <a href="#" target="_blank" class="social-link">TikTok</a>
        <a href="#" target="_blank" class="social-link">Instagram</a>
        <a href="#" target="_blank" class="social-link">YouTube</a>
        <a href="#" target="_blank" class="social-link">Spotify</a>
    </div>

</body>
</html>
